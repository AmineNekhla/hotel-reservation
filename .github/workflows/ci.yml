# ============================================================
#  LuxeStay — CI/CD Pipeline
#  Runs on every push and pull request targeting `main`.
#
#  Jobs:
#    1. backend  — Maven build + unit tests (Java 17)
#    2. frontend — npm install + Angular production build
#
#  Both jobs must pass for the workflow to succeed.
# ============================================================

name: CI — Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel in-progress runs for the same branch to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────
  #  Job 1: Backend — Build & Test (Spring Boot / Maven)
  # ──────────────────────────────────────────────────────────
  backend:
    name: Backend — Maven Build & Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      # 1. Check out the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 17 (matches the compiler target in pom.xml)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Cache the local Maven repository (~/.m2) across runs.
          # The cache key changes whenever pom.xml is modified.
          cache: maven

      # 3. Build the project and run all unit tests.
      #    -B   = batch mode (no interactive prompts, cleaner CI logs)
      #    -V   = print the Maven version upfront for traceability
      - name: Build and run tests
        run: mvn -B -V clean verify

      # 4. (Optional) Upload the Surefire test report as a build artifact.
      #    Makes test results browsable in the GitHub Actions summary.
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/target/surefire-reports/
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  #  Job 2: Frontend — Build (Angular / npm)
  # ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Angular Production Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      # 1. Check out the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js 20 LTS
      - name: Set up Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache node_modules across runs based on package-lock.json.
          # Typically saves 30–60 seconds per run.
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Install all npm dependencies (clean install for reproducibility).
      - name: Install dependencies
        run: npm ci

      # 4. Run the Angular production build.
      #    --configuration production enables Ahead-of-Time compilation,
      #    tree-shaking, and minification — a stricter build than `ng serve`.
      #    If the TypeScript compiler or Angular template compiler finds an
      #    error, this step fails and the workflow is marked as failed.
      - name: Build Angular application (production)
        run: npm run build -- --configuration production
