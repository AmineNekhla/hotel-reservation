# ============================================================
#  LuxeStay Hotel Reservation System — Application Properties
# ============================================================

# Server
server.port=8082

# ─── H2 In-Memory Database ──────────────────────────────────
# NOTE: H2 is used for easy local demo. Replace with a real
#       JDBC URL (e.g., PostgreSQL) for production deployments.
spring.datasource.url=jdbc:h2:mem:hoteldb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── JPA / Hibernate ────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# SQL logging is disabled in the main profile.
# Enable it for development via application-dev.properties.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── H2 Console ─────────────────────────────────────────────
# Available at http://localhost:8082/h2-console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JWT Configuration ──────────────────────────────────────
# SECURITY NOTE: In production, provide this value via the
# APP_JWT_SECRET environment variable and NEVER commit secrets.
#
#   export APP_JWT_SECRET=<your-strong-256-bit-secret>
#   or in application-prod.properties: app.jwt.secret=${APP_JWT_SECRET}
#
# The value below is a non-sensitive demo key for local development only.
app.jwt.secret=94a08da1fecbb6e8b46990538c7b50b2a59ce055041072979268f7422f280a9c

# Token validity: 24 hours (in milliseconds)
app.jwt.expiration-ms=86400000
